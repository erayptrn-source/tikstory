<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9744294584076377" crossorigin="anonymous"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4046540968433988" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KKNLJWE0YF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KKNLJWE0YF');
    </script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>TikStory | TikTok Video, Hikaye ve Profil Araçları</title>
    <meta name="description" content="TikStory ile TikTok hikayelerini anonim izleyin, filigransız HD video indirin ve profil resimlerini (PP) tam boyutta görüntüleyin. Ücretsiz ve programsız.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="w-full py-4 border-b border-zinc-900 relative flex flex-col md:flex-row items-center justify-between px-6 bg-zinc-950/80 sticky top-0 z-50">
        <a href="mailto:ozbekeray02@gmail.com" class="text-zinc-400 hover:text-rose-500 text-sm transition-colors md:absolute left-6 mb-3 md:mb-0">✉ ozbekeray02@gmail.com</a>
        <h1 class="text-3xl font-bold tracking-tight mx-auto cursor-pointer" onclick="window.scrollTo(0,0)">Tik<span class="text-rose-500">Story</span></h1>
        <div class="md:absolute right-6 mt-3 md:mt-0">
            <select id="langSelect" onchange="changeLanguage()" class="bg-zinc-900 text-zinc-100 border border-zinc-700 text-sm rounded-lg focus:ring-rose-500 p-2 cursor-pointer outline-none">
                <option value="tr">🇹🇷 TR</option>
                <option value="en">🇬🇧 EN</option>
            </select>
        </div>
    </header>

    <!-- Ana İçerik -->
    <div class="flex-grow flex justify-center w-full max-w-7xl mx-auto px-4 py-8 gap-6">
        <div class="hidden lg:block w-64"></div>

        <!-- Orta Alan -->
        <div class="flex-1 max-w-2xl flex flex-col items-center">
            
            <!-- Araç Seçim Sekmeleri -->
            <div class="w-full flex bg-zinc-900 border border-zinc-800 rounded-xl p-1 mb-8 shadow-lg">
                <button onclick="sekmeDegistir('hikaye')" id="tab-hikaye" class="flex-1 py-3 text-sm sm:text-base font-semibold rounded-lg bg-zinc-800 text-white shadow transition-all">Hikaye İndir</button>
                <button onclick="sekmeDegistir('video')" id="tab-video" class="flex-1 py-3 text-sm sm:text-base font-semibold rounded-lg text-zinc-400 hover:text-white transition-all">Video İndir</button>
                <button onclick="sekmeDegistir('profil')" id="tab-profil" class="flex-1 py-3 text-sm sm:text-base font-semibold rounded-lg text-zinc-400 hover:text-white transition-all">PP Büyüt</button>
            </div>

            <!-- Dinamik Başlıklar -->
            <h2 id="aracBaslik" class="text-2xl font-semibold mb-2 text-center text-white" data-translate="title_hikaye">Anonim Hikaye İzle</h2>
            <p id="aracAciklama" class="text-zinc-400 mb-8 text-center text-sm" data-translate="desc_hikaye">Kullanıcı adını yazın, anonim olarak izleyin ve kaydedin.</p>

            <div class="w-full relative mb-4 shadow-xl group">
                <span id="inputIcon" class="absolute inset-y-0 left-0 flex items-center pl-4 text-zinc-500 text-lg font-medium group-focus-within:text-rose-500 transition-colors">@</span>
                <input type="text" id="mainInput" placeholder="kullaniciadi" class="w-full bg-zinc-900 border border-zinc-700 text-white rounded-xl py-4 pl-10 pr-4 focus:outline-none focus:border-rose-500 text-center text-lg shadow-inner">
            </div>
            
            <button onclick="aramaYap()" id="searchBtn" class="w-full bg-zinc-100 hover:bg-white text-black font-semibold py-4 rounded-xl transition-all shadow-lg mb-10 text-lg" data-translate="btn_hikaye">Hikayeleri Bul</button>

            <!-- Profil Kartı & Sonuçlar & Yükleme -->
            <div id="loader" class="hidden flex-col items-center mb-10">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-rose-500 mb-2"></div>
                <p class="text-zinc-400 text-sm animate-pulse">Sistem taranıyor...</p>
            </div>
            
            <div id="userProfileContainer" class="hidden w-full mb-8"></div>
            <div id="results" class="w-full grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6"></div>

            <div id="yeniAramaContainer" class="hidden w-full mb-12 flex justify-center">
                <button onclick="yeniAramaYonetimi()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-200 border border-zinc-700 py-3 px-6 rounded-lg shadow-md text-sm">Başka Bir Arama Yap</button>
            </div>
        </div>

        <div class="hidden lg:block w-64"></div>
    </div>

    <footer class="w-full py-6 flex justify-center mt-auto border-t border-zinc-900/50">
        <div class="bg-zinc-900/50 border border-zinc-800/50 rounded-lg px-6 py-2 text-xs text-zinc-500 text-center tracking-wide">
            Bu site bir yapay zeka modelidir. ✦ Designed by Gemini
        </div>
    </footer>

    <script>
        let aktifArac = 'hikaye';
        const inputField = document.getElementById('mainInput');
        const inputIcon = document.getElementById('inputIcon');

        // Enter Tuşu Desteği
        inputField.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                aramaYap();
            }
        });

        // Sayı Formatlayıcı (Profil için)
        const formatNum = (num) => {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num || 0;
        };

        function sekmeDegistir(arac) {
            aktifArac = arac;
            const baslik = document.getElementById('aracBaslik');
            const aciklama = document.getElementById('aracAciklama');
            const buton = document.getElementById('searchBtn');

            ['hikaye', 'video', 'profil'].forEach(id => {
                const tab = document.getElementById(`tab-${id}`);
                if (id === arac) {
                    tab.classList.add('bg-zinc-800', 'text-white', 'shadow');
                    tab.classList.remove('text-zinc-400');
                } else {
                    tab.classList.remove('bg-zinc-800', 'text-white', 'shadow');
                    tab.classList.add('text-zinc-400');
                }
            });

            if (arac === 'hikaye') {
                baslik.innerText = "TikTok Hikayelerini İndir";
                aciklama.innerText = "Kullanıcı adını yazın, anonim olarak izleyin ve yüksek kalitede cihazınıza kaydedin.";
                inputField.placeholder = "kullaniciadi";
                inputIcon.innerText = "@";
                buton.innerText = "Hikayeleri Bul";
            } else if (arac === 'video') {
                baslik.innerText = "Filigransız Video İndir";
                aciklama.innerText = "TikTok video bağlantısını (link) yapıştırın ve logosuz HD şekilde indirin.";
                inputField.placeholder = "https://www.tiktok.com/...";
                inputIcon.innerText = "🔗";
                buton.innerText = "Videoyu İndir";
            } else if (arac === 'profil') {
                baslik.innerText = "Profil Resmi (PP) Büyütme";
                aciklama.innerText = "Herhangi bir kullanıcının profil fotoğrafını HD kalitede tam boyutlu indirin.";
                inputField.placeholder = "kullaniciadi";
                inputIcon.innerText = "@";
                buton.innerText = "Resmi Büyüt";
            }
            
            yeniAramaYonetimi();
        }

        function yeniAramaYonetimi() {
            inputField.value = ''; 
            document.getElementById('results').innerHTML = ''; 
            document.getElementById('userProfileContainer').innerHTML = ''; 
            document.getElementById('userProfileContainer').classList.add('hidden');
            document.getElementById('yeniAramaContainer').classList.add('hidden'); 
        }

        async function aramaYap() {
            const input = inputField.value.trim();
            const loader = document.getElementById('loader');
            const results = document.getElementById('results');
            const profileCont = document.getElementById('userProfileContainer');
            const btnYeni = document.getElementById('yeniAramaContainer');
            
            if(!input) { inputField.focus(); return; }
            
            loader.classList.remove('hidden'); loader.classList.add('flex');
            results.innerHTML = ''; profileCont.innerHTML = ''; profileCont.classList.add('hidden'); btnYeni.classList.add('hidden');
            
            try {
                // 1. HİKAYE ARACI
                if (aktifArac === 'hikaye') {
                    const res = await fetch('/api/hikayeler/' + encodeURIComponent(input));
                    const data = await res.json();
                    
                    if(data.profil && data.profil.userInfo) {
                        const user = data.profil.userInfo.user;
                        const stats = data.profil.userInfo.stats;
                        profileCont.innerHTML = `
                            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 flex flex-col sm:flex-row items-center gap-6 shadow-2xl">
                                <img src="${user.avatarLarger || user.avatarMedium}" class="w-28 h-28 rounded-full border-4 border-zinc-800 object-cover shadow-lg">
                                <div class="flex flex-col items-center sm:items-start text-center sm:text-left w-full">
                                    <h3 class="text-2xl font-bold text-white mb-1">${user.nickname}</h3>
                                    <p class="text-rose-500 text-sm font-medium mb-2">@${user.uniqueId}</p>
                                    <p class="text-zinc-400 text-sm mb-4 leading-relaxed">${user.signature || ''}</p>
                                    <div class="flex gap-6 w-full justify-center sm:justify-start border-t border-zinc-800 pt-3">
                                        <div class="flex flex-col items-center"><span class="font-bold text-white">${formatNum(stats.followingCount)}</span><span class="text-zinc-500 text-xs uppercase">Takip</span></div>
                                        <div class="flex flex-col items-center"><span class="font-bold text-white">${formatNum(stats.followerCount)}</span><span class="text-zinc-500 text-xs uppercase">Takipçi</span></div>
                                        <div class="flex flex-col items-center"><span class="font-bold text-white">${formatNum(stats.heartCount)}</span><span class="text-zinc-500 text-xs uppercase">Beğeni</span></div>
                                    </div>
                                </div>
                            </div>
                        `;
                        profileCont.classList.remove('hidden');
                    }

                    if (!data.hikayeler || !data.hikayeler.data || !data.hikayeler.data.videos || data.hikayeler.data.videos.length === 0) {
                        results.innerHTML = `<p class="text-zinc-400 w-full text-center col-span-1 sm:col-span-2 py-6 border border-zinc-800 rounded-xl bg-zinc-900/50">Aktif hikaye bulunamadı.</p>`;
                    } else {
                        let htmlIcerik = '';
                        data.hikayeler.data.videos.forEach(hikaye => {
                            let medya = '', link = '';
                            if (hikaye.images && hikaye.images.length > 0) { medya = `<img src="${hikaye.images[0]}" class="w-full h-full object-cover">`; link = hikaye.images[0]; }
                            else if (hikaye.play) { medya = `<video src="${hikaye.play}" poster="${hikaye.cover}" controls class="w-full h-full object-cover"></video>`; link = hikaye.play; }
                            
                            if (link) {
                                htmlIcerik += `
                                    <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden flex flex-col shadow-xl">
                                        <div class="h-96 bg-black flex items-center justify-center relative">${medya}</div>
                                        <div class="p-4 bg-zinc-900 border-t border-zinc-800">
                                            <a href="${link}" target="_blank" download class="w-full text-center block bg-rose-600 hover:bg-rose-700 text-white font-semibold py-3 rounded-lg shadow-lg">⬇ İndir (HD)</a>
                                        </div>
                                    </div>`;
                            }
                        });
                        results.innerHTML = htmlIcerik;
                    }
                } 
                    // 2. VİDEO İNDİRİCİ ARACI (Güncellenmiş)
                else if (aktifArac === 'video') {
                    const res = await fetch('/api/video/?url=' + encodeURIComponent(input));
                    const data = await res.json();
                    
                    // tiktok-api23'ün dönen veri yapısı genelde 'data' içindedir
                    const vData = data.data || data;
                    
                    // API'den gelen doğru video linkini yakalıyoruz
                    const videoUrl = vData.play || vData.video || vData.download_url || vData.wmplay;
                    const coverUrl = vData.cover || 'https://via.placeholder.com/300x400?text=Video';
                    
                    if (!videoUrl) throw new Error("Video linki yakalanamadı. Lütfen linki kontrol edin.");

                    results.innerHTML = `
                        <div class="col-span-1 sm:col-span-2 bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden flex flex-col md:flex-row shadow-2xl items-center p-6 gap-8">
                            <img src="${coverUrl}" class="w-full md:w-1/3 rounded-xl object-cover shadow-lg max-h-64">
                            <div class="flex flex-col w-full md:w-2/3 text-center md:text-left">
                                <h3 class="text-white font-semibold text-lg mb-4 leading-relaxed">${vData.title || 'TikTok Videosu'}</h3>
                                <!-- İNDİRME BUTONU -->
                                <a href="${videoUrl}" target="_blank" rel="noopener" class="bg-rose-600 hover:bg-rose-700 text-white font-bold py-4 px-6 rounded-lg shadow-lg text-lg transition-all active:scale-95 text-center">
                                    ⬇ Filigransız İndir
                                </a>
                                <p class="text-zinc-500 text-xs mt-3">Not: Video yeni sekmede açılırsa, videonun üzerine sağ tıklayıp "Video olarak kaydet" diyebilirsiniz.</p>
                            </div>
                        </div>
                    `;
                }
                // 3. PROFİL (PP) BÜYÜTÜCÜ ARACI
                else if (aktifArac === 'profil') {
                    const res = await fetch('/api/profil/' + encodeURIComponent(input));
                    const data = await res.json();
                    
                    const user = data.userInfo?.user || data;
                    const avatarUrl = user.avatarLarger || user.avatarMedium || user.avatar_larger;
                    
                    if (!avatarUrl) throw new Error("Profil bulunamadı.");

                    results.innerHTML = `
                        <div class="col-span-1 sm:col-span-2 bg-zinc-900 border border-zinc-800 rounded-2xl p-10 flex flex-col items-center shadow-2xl">
                            <img src="${avatarUrl}" class="w-56 h-56 rounded-full border-4 border-rose-500 object-cover shadow-2xl mb-6">
                            <h3 class="text-white font-bold text-3xl mb-8">@${user.uniqueId || input}</h3>
                            <a href="${avatarUrl}" target="_blank" class="w-full max-w-sm text-center bg-rose-600 hover:bg-rose-700 text-white font-bold py-4 rounded-xl shadow-lg text-lg transition-all">
                                ⬇ Tam Boyutta İndir (HD)
                            </a>
                        </div>
                    `;
                }
            } catch (error) {
                results.innerHTML = `<p class="text-rose-500 w-full text-center col-span-1 sm:col-span-2 py-4 bg-rose-500/10 rounded-lg border border-rose-500/20">Bir hata oluştu: ${error.message || 'Bulunamadı.'}</p>`;
            } finally {
                loader.classList.add('hidden'); loader.classList.remove('flex');
                btnYeni.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
