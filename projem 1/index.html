<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Reklam ve Takip Kodları -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9744294584076377" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KKNLJWE0YF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KKNLJWE0YF');
    </script>
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>TikStory | TikTok Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="w-full py-4 border-b border-zinc-900 flex flex-col md:flex-row items-center justify-between px-6 bg-zinc-950/80 sticky top-0 z-50">
        <a href="mailto:ozbekeray02@gmail.com" class="text-zinc-400 hover:text-rose-500 text-sm">✉ ozbekeray02@gmail.com</a>
        <h1 class="text-3xl font-bold tracking-tight mx-auto cursor-pointer" onclick="window.scrollTo(0,0)">Tik<span class="text-rose-500">Story</span></h1>
        <div class="md:absolute right-6 mt-3 md:mt-0">
            <select id="langSelect" onchange="changeLanguage()" class="bg-zinc-900 text-zinc-100 border border-zinc-700 text-sm rounded-lg p-2 cursor-pointer outline-none">
                <option value="tr">🇹🇷 TR</option>
                <option value="en">🇬🇧 EN</option>
            </select>
        </div>
    </header>

    <!-- Ana İçerik -->
    <div class="flex-grow flex justify-center w-full max-w-7xl mx-auto px-4 py-8">
        <div class="flex-1 max-w-2xl flex flex-col items-center">
            
            <!-- Araç Seçim Sekmeleri -->
            <div class="w-full flex bg-zinc-900 border border-zinc-800 rounded-xl p-1 mb-8 shadow-lg">
                <button onclick="sekmeDegistir('hikaye')" id="tab-hikaye" class="flex-1 py-3 text-sm font-semibold rounded-lg bg-zinc-800 text-white shadow" data-translate="tab1">Hikaye İndir</button>
                <button onclick="sekmeDegistir('video')" id="tab-video" class="flex-1 py-3 text-sm font-semibold rounded-lg text-zinc-400 hover:text-white" data-translate="tab2">Video İndir</button>
                <button onclick="sekmeDegistir('profil')" id="tab-profil" class="flex-1 py-3 text-sm font-semibold rounded-lg text-zinc-400 hover:text-white" data-translate="tab3">PP Büyüt</button>
            </div>

            <!-- Dinamik Başlıklar -->
            <h2 id="aracBaslik" class="text-2xl font-semibold mb-2 text-center text-white" data-translate="title">TikTok Hikayelerini İndir</h2>
            <p id="aracAciklama" class="text-zinc-400 mb-8 text-center text-sm" data-translate="desc">Kullanıcı adını yazın, anonim olarak izleyin ve yüksek kalitede cihazınıza kaydedin.</p>

            <div class="w-full relative mb-4 shadow-xl group">
                <span id="inputIcon" class="absolute inset-y-0 left-0 flex items-center pl-4 text-zinc-500 text-lg font-medium">@</span>
                <input type="text" id="mainInput" placeholder="kullaniciadi" class="w-full bg-zinc-900 border border-zinc-700 text-white rounded-xl py-4 pl-10 pr-4 focus:outline-none focus:border-rose-500 text-center text-lg shadow-inner">
            </div>
            
            <button onclick="aramaYap()" id="searchBtn" class="w-full bg-zinc-100 hover:bg-white text-black font-semibold py-4 rounded-xl transition-all shadow-lg mb-10 text-lg" data-translate="btn">Hikayeleri Bul</button>

            <div id="loader" class="hidden flex-col items-center mb-10">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-rose-500 mb-2"></div>
                <p class="text-zinc-400 text-sm" data-translate="loading">Sistem taranıyor...</p>
            </div>
            
            <div id="userProfileContainer" class="hidden w-full mb-8"></div>
            <div id="results" class="w-full grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6"></div>
        </div>
    </div>

    <script>
        const translations = {
            tr: {
                tab1: "Hikaye İndir", tab2: "Video İndir", tab3: "PP Büyüt",
                title: "TikTok Hikayelerini İndir", desc: "Kullanıcı adını yazın, anonim olarak izleyin ve yüksek kalitede cihazınıza kaydedin.",
                btn: "Hikayeleri Bul", loading: "Sistem taranıyor...",
                err1: "Aktif hikaye bulunamadı.", err2: "Video linki yakalanamadı.", err3: "Profil bulunamadı.",
                download: "⬇ İndir (HD)"
            },
            en: {
                tab1: "Story Download", tab2: "Video Download", tab3: "Profile Zoom",
                title: "Download TikTok Stories", desc: "Enter the username, watch anonymously, and save to your device in high quality.",
                btn: "Find Stories", loading: "System scanning...",
                err1: "No active story found.", err2: "Video link could not be captured.", err3: "Profile not found.",
                download: "⬇ Download (HD)"
            }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                if (translations[lang][key]) el.innerText = translations[lang][key];
            });
            // Placeholder güncelleme
            document.getElementById('mainInput').placeholder = (lang === 'tr') ? 'kullaniciadi' : 'username';
        }

        function sekmeDegistir(arac) {
            const baslik = document.getElementById('aracBaslik');
            const aciklama = document.getElementById('aracAciklama');
            const buton = document.getElementById('searchBtn');
            const lang = document.getElementById('langSelect').value;
            
            // Sekme başlıklarını ve içerikleri güncelle
            if (arac === 'hikaye') {
                baslik.innerText = translations[lang].title;
                aciklama.innerText = translations[lang].desc;
                buton.innerText = translations[lang].btn;
            } else if (arac === 'video') {
                baslik.innerText = (lang === 'tr') ? "Filigransız Video İndir" : "Download Video Without Watermark";
                aciklama.innerText = (lang === 'tr') ? "Video linkini yapıştırın." : "Paste the video link.";
                buton.innerText = (lang === 'tr') ? "Videoyu İndir" : "Download Video";
            } else {
                baslik.innerText = (lang === 'tr') ? "Profil Resmi Büyütme" : "Profile Picture Zoom";
                aciklama.innerText = (lang === 'tr') ? "Kullanıcı adını yazın." : "Enter username.";
                buton.innerText = (lang === 'tr') ? "Resmi Büyüt" : "Zoom Picture";
            }
        }
    </script>
</body>
</html>
